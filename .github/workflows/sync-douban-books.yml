name: Sync Douban Books

on:
  schedule:
    # 每周日 UTC 17:00 (北京时间周一 1:00)
    - cron: '0 17 * * 0'
  workflow_dispatch: # 手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Sync books from Douban API
        run: node scripts/sync-douban.js book

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          message: '📚 同步豆瓣书籍数据'
          add: 'data/ images/books/* README.md'
