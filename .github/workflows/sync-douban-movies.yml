name: Sync Douban Movies

on:
  schedule:
    # 每周日 UTC 16:00 (北京时间周一 0:00)
    - cron: '0 16 * * 0'
  workflow_dispatch: # 手动触发

concurrency:
  group: sync-douban
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Sync movies from Douban API
        run: node scripts/sync-douban.js movie

      - name: Pull latest before push
        run: git pull --rebase origin main

      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          message: '🎬 同步豆瓣电影数据'
          add: 'data/ images/movies/* README.md'
